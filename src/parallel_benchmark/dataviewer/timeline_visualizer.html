        }
        
        // 生成自依赖曲线路径（从同一行的一个点到另一个点，向下弯曲）
        function generateSelfDependencyPath(x1, x2, y, offset) {
            const points = 30;
            const xArr = [], yArr = [];
            const midX = (x1 + x2) / 2;
            const controlY = y + offset; // 向下弯曲
            
            for (let i = 0; i <= points; i++) {
                const t = i / points;
                xArr.push((1 - t) ** 2 * x1 + 2 * (1 - t) * t * midX + t ** 2 * x2);
                yArr.push((1 - t) ** 2 * y + 2 * (1 - t) * t * controlY + t ** 2 * y);
            }
            
            return { x: xArr, y: yArr };
        }

        // 添加连接线
        function addConnectionLines(traces, agentMap, startTime) {
            // 依赖关系线 (V2: plan_agent)
            // 收集所有 agent 的 round 时间信息，用于精确绘制依赖线
            const agentRoundTimes = new Map(); // agentId_roundNum -> {start, end, yPos}
            
            recordData.devices.forEach(device => {
                device.agents.forEach(agent => {
                    const agentLabel = getAgentKey(agent);
                    const agentInfo = agentMap.get(agentLabel);
                    if (!agentInfo) return;
                    
                    (agent.rounds || []).forEach((round, rIdx) => {
                        const roundNum = round.round_id !== undefined ? round.round_id : rIdx;
                        const roundStart = (round.model_prediction?.time_span?.start_timestamp || startTime) - startTime;
                        const roundEnd = (round.action_execution?.time_span?.end_timestamp || 
                                          round.model_prediction?.time_span?.end_timestamp || 
                                          startTime) - startTime;
                        
                        agentRoundTimes.set(`${agentLabel}_r${roundNum}`, {
                            start: roundStart,
                            end: roundEnd,
                            yPos: agentInfo.yPos,
                            label: agentLabel
                        });
                    });
                });
            });
            
            // 依赖关系是从 Plan Agent 的角度定义的
            // 表示 Plan Round N 中对某个 agent 的调用依赖于之前 Plan Round 中的调用
            // 即使是同一个 agent（自依赖），也需要显示依赖线
            recordData.plan_agent.rounds.forEach((round, planRoundIdx) => {
                const planRoundNum = round.round_id !== undefined ? round.round_id : planRoundIdx;
                
                if (round.dependencies) {
                    Object.entries(round.dependencies).forEach(([agentKey, depInfo]) => {
                        if (depInfo.depends_on?.length > 0) {
                            depInfo.depends_on.forEach(dep => {
                                // 查找被依赖的 agent（源）
                                const sourceAgent = findAgentInMap(dep.agent_id, agentMap);
                                // 查找有依赖的 agent（目标）- 可能是同一个 agent
                                const targetAgent = findAgentInMap(agentKey, agentMap);
                                
                                if (sourceAgent && targetAgent) {
                                    // 获取对应 Plan Round 的时间
                                    const sourcePlanRound = recordData.plan_agent.rounds[dep.round - 1];
                                    const targetPlanRound = recordData.plan_agent.rounds[depInfo.round - 1] || round;
                                    
                                        // 时序依赖：同一个 agent 被 Plan Agent 在不同 Round 中调用
                                        // 依赖线从前一次调用的结束位置连接到后一次调用的开始位置
                                        if (dep.agent_id === agentKey) {
                                            const instances = sourceAgent.agentInstances || [sourceAgent];
                                            
                                            // 通过 parent_round 找到正确的源实例和目标实例
                                            // dep.round 是 plan_agent 的 round 编号（1-indexed），对应 parent_round = dep.round - 1
                                            // depInfo.round 是目标所在的 plan_agent round（1-indexed）
                                            const sourceParentRound = dep.round - 1;  // 转为 0-indexed
                                            const targetParentRound = depInfo.round - 1;  // 转为 0-indexed
                                            
                                            let sourceInstance = instances.find(inst => inst.agent.parent_round === sourceParentRound);
                                            let targetInstance = instances.find(inst => inst.agent.parent_round === targetParentRound);
                                            
                                            // 如果通过 parent_round 找不到，按时间排序作为后备
                                            if (!sourceInstance || !targetInstance) {
                                                const sorted = [...instances].sort((a, b) => a.start - b.start);
                                                if (sorted.length >= 2) {
                                                    sourceInstance = sourceInstance || sorted[0];
                                                    targetInstance = targetInstance || sorted[1];
                                                }
                                            }
                                            
                                            if (sourceInstance && targetInstance && sourceInstance !== targetInstance) {
                                                // 依赖线从源实例的结束位置开始
                                                const sourceEnd = sourceInstance.end;
                                                // 连接到目标实例的开始位置
                                                const targetStart = targetInstance.start;
                                                
                                                // 对于自依赖（同一agent），使用直线连接
                                                // 注意：自依赖时 sourceAgent 和 targetAgent 是同一个对象，yPos 相同
                                                
                                                // 绘制圆形标记在源实例结束位置
                                                traces.push({
                                                    x: [sourceEnd],
                                                    y: [sourceAgent.yPos],
                                                    mode: 'markers',
                                                    type: 'scatter',
                                                    marker: { 
                                                        symbol: 'circle',
                                                        size: 12,
                                                        color: COLORS.dependency,
                                                        line: { color: '#fff', width: 2 }
                                                    },
                                                    showlegend: false,
                                                    hovertemplate: `<b>时序依赖起点</b><br>` +
                                                        `${sourceAgent.label} (Plan Round ${dep.round}) 结束<br>` +
                                                        `时间: ${sourceEnd.toFixed(2)}s<br>` +
                                                        `原因: ${dep.reason || 'N/A'}<extra></extra>`
                                                });
                                                
                                                // 绘制直线从源实例结束到目标实例开始
                                                traces.push({
                                                    x: [sourceEnd, targetStart],
                                                    y: [sourceAgent.yPos, targetAgent.yPos],
                                                    mode: 'lines',
                                                    type: 'scatter',
                                                    line: { 
                                                        color: COLORS.dependency, 
                                                        width: 3,
                                                        dash: 'dash' 
                                                    },
                                                    showlegend: false,
                                                    hovertemplate: `<b>时序依赖</b><br>` +
                                                        `${sourceAgent.label}<br>` +
                                                        `Plan Round ${dep.round} → Round ${depInfo.round}<br>` +
                                                        `原因: ${dep.reason || 'N/A'}<extra></extra>`
                                                });
                                                
                                                // 添加箭头标记在目标实例开始位置
                                                traces.push({
                                                    x: [targetStart],
                                                    y: [targetAgent.yPos],
                                                    mode: 'markers',
                                                    type: 'scatter',
                                                    marker: { 
                                                        symbol: 'triangle-right',
                                                        size: 12,
                                                        color: COLORS.dependency
                                                    },
                                                    showlegend: false,
                                                    hovertemplate: `<b>时序依赖终点</b><br>` +
                                                        `${targetAgent.label} (Plan Round ${depInfo.round}) 开始<br>` +
                                                        `时间: ${targetStart.toFixed(2)}s<extra></extra>`
                                                });
                                            }
                                    } else {
                                        // 不同 agent 之间的依赖
                                        // 根据 parent_round 找到正确的源实例和目标实例
                                        const sourceInstances = sourceAgent.agentInstances || [sourceAgent];
                                        const targetInstances = targetAgent.agentInstances || [targetAgent];
                                        
                                        // dep.round 是 plan_agent 的 round 编号（1-indexed），对应 parent_round = dep.round - 1
                                        // depInfo.round 是目标所在的 plan_agent round（1-indexed）
                                        const sourceParentRound = dep.round - 1;  // 转为 0-indexed
                                        const targetParentRound = depInfo.round - 1;  // 转为 0-indexed
                                        
                                        let sourceInstance = sourceInstances.find(inst => inst.agent?.parent_round === sourceParentRound);
                                        let targetInstance = targetInstances.find(inst => inst.agent?.parent_round === targetParentRound);
                                        
                                        // 如果通过 parent_round 找不到，使用第一个/最后一个实例作为后备
                                        if (!sourceInstance && sourceInstances.length > 0) {
                                            sourceInstance = sourceInstances[0];
                                        }
                                        if (!targetInstance && targetInstances.length > 0) {
                                            targetInstance = targetInstances[0];
                                        }
                                        
                                        const sourceEnd = sourceInstance?.end || sourceAgent.end;
                                        const targetStart = targetInstance?.start || targetAgent.start;
                                        
                                        // 绘制圆形标记在源实例结束位置
                                        traces.push({
                                            x: [sourceEnd],
                                            y: [sourceAgent.yPos],
                                            mode: 'markers',
                                            type: 'scatter',
                                            marker: { 
                                                symbol: 'circle',
                                                size: 12,
                                                color: COLORS.dependency,
                                                line: { color: '#fff', width: 2 }
                                            },
                                            showlegend: false,
                                            hovertemplate: `<b>依赖起点</b><br>` +
                                                `${sourceAgent.label} (Plan Round ${dep.round}) 结束<br>` +
                                                `时间: ${sourceEnd.toFixed(2)}s<br>` +
                                                `原因: ${dep.reason || 'N/A'}<extra></extra>`
                                        });
                                        
                                        // 绘制直线从源实例结束到目标实例开始
                                        traces.push({
                                            x: [sourceEnd, targetStart],
                                            y: [sourceAgent.yPos, targetAgent.yPos],
                                            mode: 'lines',
                                            type: 'scatter',
                                            line: { 
                                                color: COLORS.dependency, 
                                                width: 3,
                                                dash: 'dash' 
                                            },
                                            showlegend: false,
                                            hovertemplate: `<b>依赖关系 (Plan 视角)</b><br>` +
                                                `${sourceAgent.label} → ${targetAgent.label}<br>` +
                                                `Plan Round ${dep.round} → Round ${depInfo.round}<br>` +
                                                `原因: ${dep.reason || 'N/A'}<extra></extra>`
                                        });
                                        
                                        // 添加箭头标记在目标实例开始位置
                                        traces.push({
                                            x: [targetStart],
                                            y: [targetAgent.yPos],
                                            mode: 'markers',
                                            type: 'scatter',
                                            marker: { 
                                                symbol: 'triangle-right',
                                                size: 12,
                                                color: COLORS.dependency
                                            },
                                            showlegend: false,
                                            hovertemplate: `<b>依赖终点</b><br>` +
                                                `${targetAgent.label} (Plan Round ${depInfo.round}) 开始<br>` +
                                                `时间: ${targetStart.toFixed(2)}s<extra></extra>`
                                        });
                                    }
                                }
                            });
                        }
                    });
                }
            });
            
            // 分派连接线已移除 - 根据用户要求不再绘制任务分配线
        }

        // 创建 Round 分隔线 (V2: plan_agent, time_span)
        function createRoundSeparators(startTime) {
            const shapes = [];
            recordData.plan_agent.rounds.forEach((round, idx) => {
                if (idx > 0) {
                    const roundStart = round.model_prediction.time_span.start_timestamp - startTime;
                    shapes.push({
                        type: 'line',
                        x0: roundStart,
                        x1: roundStart,
                        y0: -0.5,
                        y1: 100,
                        xref: 'x',
                        yref: 'y',
                        line: { color: 'rgba(163, 113, 247, 0.2)', width: 1, dash: 'dot' }
                    });
                }
            });
            return shapes;
        }

        // Agent 名称匹配辅助函数
        // 支持通过 agent_id、agent_count 或 agent_id 格式的字符串匹配 agentInfo
        function findAgentInMap(agentId, agentMap) {
            // 1. 直接匹配（agent_count 格式）
            const direct = agentMap.get(agentId);
            if (direct) return direct;
            
            // 2. 遍历所有 agentInfo，检查其中的 agent 对象的 agent_id 和 agent_count
            for (const [key, agentInfo] of agentMap.entries()) {
                // 检查 agentInfo 的主 agent
                if (agentInfo.agent) {
                    if (agentInfo.agent.agent_id === agentId || 
                        agentInfo.agent.agent_count === agentId ||
                        agentInfo.agent.unique_id === agentId) {
                        return agentInfo;
                    }
                }
                
                // 检查 agentInfo 的所有实例
                if (agentInfo.agentInstances) {
                    for (const instance of agentInfo.agentInstances) {
                        if (instance.agent) {
                            if (instance.agent.agent_id === agentId ||
                                instance.agent.agent_count === agentId ||
                                instance.agent.unique_id === agentId) {
                                return agentInfo;
                            }
                        }
                    }
                }
            }
            
            // 3. 模糊匹配（通过数字后缀匹配）
            const depNumMatch = agentId.match(/_(\d+)$/);
            if (depNumMatch) {
                const depNum = depNumMatch[1];
                for (const [key, value] of agentMap.entries()) {
                    const keyNumMatch = key.match(/_(\d+)$/);
                    if (keyNumMatch && keyNumMatch[1] === depNum) {
                        const depType = agentId.includes('gui') ? 'gui' : agentId.includes('code') ? 'code' : '';
                        const keyType = key.includes('gui') ? 'gui' : key.includes('code') ? 'code' : '';
                        if (!depType || !keyType || depType === keyType) {
                            return value;
                        }
                    }
                }
            }
            
            return null;
        }
            
        // 曲线路径生成
        function generateCurvedPath(x1, y1, x2, y2, curvature = 0.3) {
            const points = 25;
            const x = [], y = [];
                const midX = (x1 + x2) / 2;
                const midY = (y1 + y2) / 2;
                const dx = x2 - x1;
                const dy = y2 - y1;
            const len = Math.sqrt(dx * dx + dy * dy);
            
            if (len === 0) return { x: [x1, x2], y: [y1, y2] };
            
            const controlOffset = len * curvature;
            const controlX = midX - (dy / len) * controlOffset;
            const controlY = midY + (dx / len) * controlOffset;
            
                for (let i = 0; i <= points; i++) {
                    const t = i / points;
                x.push((1 - t) ** 2 * x1 + 2 * (1 - t) * t * controlX + t ** 2 * x2);
                y.push((1 - t) ** 2 * y1 + 2 * (1 - t) * t * controlY + t ** 2 * y2);
                }
                
                return { x, y };
            }

            if (!clickData) {
                console.log('No customdata found');

                // 点击展开的 Agent Round，显示该 Round 的详情
                showAgentRoundDetail(clickData.agent, clickData.roundIdx);
            }
        }

        // 导航到特定 Agent（在 Level 1 中展开/折叠该实例，支持 toggle）
        function navigateToAgent(agentLabel) {
            recordData.devices.forEach(device => {
                device.agents.forEach(agent => {
                    const key = getAgentKey(agent);
                    if (key === agentLabel || agent.agent_count === agentLabel) {
                        // 在 Level 1 中切换该实例的展开/折叠状态
                        const callKey = getAgentKey(agent);
                        
                        // Toggle: 如果已展开则折叠，否则展开
                        if (expandedAgents.has(callKey)) {
                            expandedAgents.delete(callKey);
                        } else {
                            expandedAgents.add(callKey);
                        }
                        
                        // 重新渲染 Level 1（会根据 expandedAgents 状态显示展开/折叠）
                        renderLevel1();

        }

        // ==================== Agent 详情 (Level 2) ====================
        function showAgentDetail(agent, deviceId) {
            currentView = 'level2-agent';
            currentAgent = agent;
            currentRoundIdx = 0;
            
            const agentLabel = getAgentDisplay(agent, deviceId);
            updateBreadcrumb('level2-agent', agentLabel);
            
            // 渲染 Agent 的 Round 时间线
            renderAgentRoundsTimeline(agent, deviceId);
            
            // 显示第一个 Round 的详情
            if (agent.rounds?.length > 0) {
                showAgentRoundDetail(agent, 0);
            }
        }

        // 渲染 Agent 的 Round 时间线
        function renderAgentRoundsTimeline(agent, deviceId) {
            const container = document.getElementById('chart-container');
            
            // 清除旧内容
            container.innerHTML = '';
            
            if (!agent.rounds || agent.rounds.length === 0) {
                container.innerHTML = `
                    <div class="chart-placeholder">
                        <div class="chart-placeholder-icon">📭</div>
                        <div>该 Agent 没有 Round 数据</div>
                    </div>
                `;
                return;
            }

            // V2: time_span
            const agentStartTime = agent.rounds[0].model_prediction.time_span.start_timestamp;
            const agentEndTime = agent.recording?.end_timestamp || 
                agent.rounds[agent.rounds.length - 1].action_execution?.time_span?.end_timestamp ||
                    agent.rounds[agent.rounds.length - 1].model_prediction.time_span.end_timestamp;
            const agentDuration = agentEndTime - agentStartTime;
            
            const traces = [];
            const yLabels = [];
            
            agent.rounds.forEach((round, idx) => {
                // V2: round_id
                const roundNum = round.round_id !== undefined ? round.round_id : idx + 1;
                yLabels.push(`Round ${roundNum}`);
                
                // V2: time_span
                const roundStart = round.model_prediction.time_span.start_timestamp - agentStartTime;
                const modelEnd = round.model_prediction.time_span.end_timestamp - agentStartTime;
                
                // Model Thinking
                traces.push({
                    x: [roundStart, modelEnd],
                    y: [idx, idx],
                    mode: 'lines',
                    type: 'scatter',
                    line: { color: COLORS.modelTime, width: LINE_WIDTH.agentRound },
                    showlegend: false,
                    hovertemplate: `<b>Round ${roundNum} - Model Thinking</b><br>` +
                          `耗时: ${round.model_prediction.time_span.duration.toFixed(3)}s<br>` +
                          `任务: ${(agent.task || 'N/A').replace(/\n/g, '<br>')}<extra></extra>`,
                    customdata: [{ type: 'agent-round', roundIdx: idx, stage: 'model' }]
                });
                
                // Action Execution
                if (round.action_execution) {
                    // V2: time_span
                    const actionStart = round.action_execution.time_span.start_timestamp - agentStartTime;
                    const actionEnd = round.action_execution.time_span.end_timestamp - agentStartTime;
                    
                    traces.push({
                        x: [actionStart, actionEnd],
                        y: [idx, idx],
                        mode: 'lines',
                        type: 'scatter',
                        line: { color: COLORS.actionTime, width: LINE_WIDTH.agentRound },
                        showlegend: false,
                        hovertemplate: `<b>Round ${roundNum} - Action Execution</b><br>` +
                              `耗时: ${round.action_execution.time_span.duration.toFixed(3)}s<br>` +
                              `状态: ${round.action_execution.result?.status || 'N/A'}<br>` +
                              `任务: ${(agent.task || 'N/A').replace(/\n/g, '<br>')}<extra></extra>`,
                        customdata: [{ type: 'agent-round', roundIdx: idx, stage: 'action' }]
                    });
                }
            });
            
            const agentLabel = getAgentDisplay(agent, deviceId);
            const typeLabel = agent.type === 'gui' ? 'GUI Agent' : 'Code Agent';
            
            const layout = {
                title: {
                    text: `${agentLabel} (${typeLabel}) - Round 时间线`,
                    font: { size: 14, color: COLORS.text }
                },
                xaxis: {
                    title: { text: '时间 (秒)', font: { color: COLORS.text } },
                    range: [-0.5, agentDuration * 1.1],
                    gridcolor: COLORS.grid,
                    tickfont: { color: COLORS.text }
                },
                yaxis: {
                    tickmode: 'array',
                    tickvals: Array.from({ length: yLabels.length }, (_, i) => i),
                    ticktext: yLabels,
                    autorange: 'reversed',
                    gridcolor: COLORS.grid,
                    tickfont: { color: COLORS.text }
                },
                height: Math.max(300, yLabels.length * 50 + 100),
                paper_bgcolor: COLORS.background,
                plot_bgcolor: COLORS.background,
                hovermode: 'closest',
                margin: { l: 100, r: 40, t: 60, b: 60 },
                hoverlabel: {
                    bgcolor: '#1e2530',
                    bordercolor: '#30363d',
                    font: { 
                        family: 'Noto Sans SC, sans-serif', 
                        size: 12, 
                        color: '#e6edf3' 
                    },
                    align: 'left',
                    namelength: -1
                }
            };
            
            const config = {
                displayModeBar: true,
                modeBarButtonsToRemove: ['lasso2d', 'select2d'],
                responsive: true,
                displaylogo: false
            };
            
            Plotly.newPlot('chart-container', traces, layout, config).then(() => {
                document.getElementById('chart-container').on('plotly_click', (data) => {
                    console.log('Agent round click:', data);
                    const point = data.points[0];
                    if (!point) return;
                    
                    let clickData = point.customdata;
                    if (Array.isArray(clickData)) {
                        clickData = clickData[0];
                    }
                    
                    if (clickData?.type === 'agent-round') {
                        currentRoundIdx = clickData.roundIdx;
                        showAgentRoundDetail(currentAgent, currentRoundIdx);
                    }
                });
            });
        }

        // ==================== Agent Round 详情 (包含图片和动作序列) ====================
        function showAgentRoundDetail(agent, roundIdx) {
            currentAgent = agent;  // 确保 currentAgent 被更新
            currentRoundIdx = roundIdx;
            const round = agent.rounds[roundIdx];
            // V2: round_id
            const roundNum = round.round_id !== undefined ? round.round_id : roundIdx + 1;
            
            const agentLabel = getAgentDisplay(agent, agent.device_id || '');
            const isGUI = agent.type === 'gui';
            const badgeClass = isGUI ? 'badge-gui' : 'badge-code';
            const typeLabel = isGUI ? 'GUI Agent' : 'Code Agent';
            
            // 收集图片
            const images = collectRoundImages(round);
            
            // 收集详细动作（使用新的解析函数）
            const detailedActions = extractDetailedActions(round);
            
            // 收集所有 tool_calls
            const toolCalls = collectToolCalls(round);
            
            // 收集所有 assistant responses
            const assistantResponses = collectAssistantResponses(round);
            
            const panel = document.getElementById('detail-panel');
            panel.innerHTML = `
                <div class="detail-header">
                    <div class="detail-title">
                        <span>🤖 ${agentLabel} - Round ${roundNum}</span>
                        <span class="detail-badge ${badgeClass}">${typeLabel}</span>
                    </div>
                    <button class="detail-close" onclick="closeDetailPanel()">×</button>
                </div>
                <div class="detail-content">
                    <!-- Round 选择器 (V2: round_id) -->
                    ${agent.rounds.length > 1 ? `
                    <div class="round-selector">
                        ${agent.rounds.map((r, idx) => {
                            const rNum = r.round_id !== undefined ? r.round_id : idx + 1;
                            return `<button class="round-btn ${idx === roundIdx ? 'active' : ''}" 
                                    onclick="showAgentRoundDetail(currentAgent, ${idx})">
                                Round ${rNum}
                            </button>`;
                        }).join('')}
                    </div>
                    ` : ''}
                    
                    <!-- 时间统计 (V2: time_span) -->
                <div class="detail-section">
                        <div class="section-title">时间统计</div>
                        <div class="metrics-grid">
                            <div class="metric-card metric-model">
                                <div class="metric-icon">🧠</div>
                                <div class="metric-value">${round.model_prediction.time_span.duration.toFixed(3)}s</div>
                                <div class="metric-label">Model Time</div>
                        </div>
                            <div class="metric-card metric-action">
                                <div class="metric-icon">⚡</div>
                                <div class="metric-value">${round.action_execution?.time_span?.duration.toFixed(3) || '0.000'}s</div>
                                <div class="metric-label">Action Time</div>
                        </div>
                            <div class="metric-card metric-total">
                                <div class="metric-icon">⏱️</div>
                                <div class="metric-value">${round.total_duration.toFixed(3)}s</div>
                                <div class="metric-label">Total Time</div>
                        </div>
                            ${round.action_execution?.result?.status ? `
                            <div class="metric-card">
                                <div class="metric-icon">${round.action_execution.result.status === 'success' || round.action_execution.result.status === 'finished' ? '✅' : '❌'}</div>
                                <div class="metric-value" style="font-size: 1rem;">
                                    ${round.action_execution.result.status === 'success' ? '成功' : round.action_execution.result.status === 'finished' ? '完成' : '失败'}
                            </div>
                                <div class="metric-label">执行状态</div>
                        </div>
                        ` : ''}
                    </div>
                </div>
                    
                    <!-- 图片画廊 (GUI Agent) -->
                    ${isGUI && images.length > 0 ? `
                <div class="detail-section">
                        <div class="section-title">📸 执行截图 (${images.length} 张)</div>
                        <div class="image-grid">
                            ${images.map((img, idx) => `
                                <div class="image-card" onclick="openImageModal(${JSON.stringify(images).replace(/"/g, '&quot;')}, ${idx})">
                                    <img src="${processImageUrl(img.url)}" 
                                         alt="Step ${img.step}" 
                                         loading="lazy"
                                         onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22120%22><rect fill=%22%231e2530%22 width=%22200%22 height=%22120%22/><text x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 fill=%22%236e7681%22 font-size=%2212%22>加载失败</text></svg>'">
                                    <div class="image-card-info">Step ${img.step} - ${img.role}</div>
                                </div>
                            `).join('')}
                    </div>
                </div>
                ` : ''}
                    
                    <!-- 动作序列（详细信息：坐标、文本等） -->
                    ${detailedActions.length > 0 ? `
                <div class="detail-section">
                        <div class="section-title">🎯 动作序列 (${detailedActions.length} 个)</div>
                        <div class="action-list">
                            ${detailedActions.map((action, idx) => `
                                <div class="action-item">
                                    <div class="action-index">${idx + 1}</div>
                                    <div class="action-info">
                                        <div class="action-type">${action.description || action.type}</div>
                                        <div class="action-desc">
                                            ${action.details || ''}
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    ` : ''}
                    
                    <!-- Tool Calls 展示 -->
                    ${toolCalls.length > 0 ? `
                <div class="detail-section">
                        <div class="section-title">🔧 Tool Calls (${toolCalls.length} 个)</div>
                        <div class="action-list">
                            ${toolCalls.map((toolCall, idx) => {
                                const argsDisplay = typeof toolCall.parsedArguments === 'object' 
                                    ? JSON.stringify(toolCall.parsedArguments, null, 2)
                                    : toolCall.arguments;
                                return `
                                <div class="action-item">
                                    <div class="action-index">${idx + 1}</div>
                                    <div class="action-info">
                                        <div class="action-type">${toolCall.functionName}</div>
                                        <div class="action-desc">
                                            <div style="margin-bottom: 0.5rem;">
                                                <strong>ID:</strong> <code>${toolCall.id}</code>
                                            </div>
                                            <div style="margin-bottom: 0.5rem;">
                                                <strong>参数:</strong>
                                            </div>
                                            <div class="code-block" style="margin-top: 0.5rem; font-size: 0.8rem; max-height: 200px; overflow-y: auto;">
                                                ${escapeHtml(argsDisplay)}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `;
                            }).join('')}
                        </div>
                    </div>
                    ` : ''}
                    
                    <!-- Assistant Responses 展示 -->
                    ${assistantResponses.length > 0 ? `
                <div class="detail-section">
                        <div class="section-title">💬 Assistant Responses (${assistantResponses.length} 条)</div>
                        ${assistantResponses.map((response, idx) => `
                            <div style="margin-bottom: 1rem; padding: 1rem; background: var(--bg-tertiary); border-radius: 6px; border: 1px solid var(--border-color);">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                                    <div style="font-size: 0.85rem; color: var(--text-muted);">
                                        ${response.isRoundResponse ? '📋 Round 级别响应' : `消息 #${response.messageIdx + 1}`}
                                    </div>
                                    ${response.hasToolCalls ? `
                                        <span style="font-size: 0.75rem; padding: 0.2rem 0.5rem; background: rgba(88, 166, 255, 0.15); color: var(--accent-blue); border-radius: 4px;">
                                            包含 ${response.toolCallsCount} 个 Tool Call
                                        </span>
                                    ` : ''}
                                </div>
                                ${response.content && response.content.trim() ? `
                                    <div class="code-block response" style="margin: 0;">
                                        ${escapeHtml(response.content)}
                                    </div>
                                ` : '<div style="color: var(--text-muted); font-style: italic; font-size: 0.85rem;">（无文本内容，仅包含 Tool Calls）</div>'}
                            </div>
                        `).join('')}
                    </div>
                    ` : ''}
                    
                    <!-- Model Response (保留原有展示，作为主要响应) -->
                    ${round.model_prediction?.response && !assistantResponses.some(r => r.isRoundResponse) ? `
                    <div class="detail-section">
                        <div class="section-title">🧠 Model Response</div>
                        <div class="code-block response">${escapeHtml(round.model_prediction.response)}</div>
                </div>
                    ` : ''}
                    
                    <!-- 执行结果 -->
                    ${round.action_execution?.result ? `
                <div class="detail-section">
                        <div class="section-title">⚙️ 执行结果</div>
                        ${round.action_execution.result.status ? `
                        <div style="margin-bottom: 0.75rem;">
                            <span class="status-tag ${round.action_execution.result.status === 'success' || round.action_execution.result.status === 'finished' ? 'status-success' : 'status-failure'}">
                                ${round.action_execution.result.status === 'success' ? '✓ 成功' : round.action_execution.result.status === 'finished' ? '✓ 完成' : '✗ 失败'}
                            </span>
                            ${round.action_execution.result.returncode !== undefined ? 
                                `<span style="margin-left: 0.5rem; color: var(--text-muted); font-size: 0.85rem;">
                                    返回码: ${round.action_execution.result.returncode}
                                </span>` : ''
                            }
                        </div>
                        ` : `<!-- 中间步骤不显示状态，避免误导（GUI agent中间步骤没有明确的成功/失败状态） -->`}
                        ${round.action_execution.result.output ? `
                            <div class="code-block">${escapeHtml(round.action_execution.result.output)}</div>
                    ` : ''}
                        ${round.action_execution.result.error ? `
                            <div class="code-block" style="border-color: var(--accent-red); color: var(--accent-red);">
                                ${escapeHtml(round.action_execution.result.error)}
                            </div>
                    ` : ''}
                    </div>
                    ` : ''}
                    
                    <!-- 执行代码 -->
                    ${round.action_execution?.code ? `
                    <div class="detail-section">
                        <div class="section-title">💻 执行代码</div>
                        <div class="code-block">${escapeHtml(round.action_execution.code)}</div>
                </div>
                ` : ''}
                </div>
            `;
            
            panel.classList.add('active');
        }

        /**
         * 统一处理图片路径：截断绝对路径到 extracted_images 开头，清理多余前缀
         * @param {string} rawUrl - 原始图片 URL
         * @returns {string} - 归一化后的路径（可能仍为空字符串）
         */
        function normalizeImagePath(rawUrl) {
            if (!rawUrl) return '';
            let cleaned = rawUrl.trim();
            const idx = cleaned.indexOf('extracted_images/');
            if (idx !== -1) {
                cleaned = cleaned.slice(idx);
            }
            cleaned = cleaned.replace(/^\.\/+/, '');
            return cleaned;
        }

        // 收集 Round 中的图片
        function collectRoundImages(round) {
            const images = [];
            
            if (round.model_prediction?.messages) {
                round.model_prediction.messages.forEach((msg, msgIdx) => {
                    if (msg.content && Array.isArray(msg.content)) {
                        msg.content.forEach((item, itemIdx) => {
                            if (item.image_url?.url) {
                                const url = normalizeImagePath(item.image_url.url);
                                // 跳过无效的图片URL（占位符或不存在的路径）
                                if (url && 
                                    url !== '[IMAGE_DATA_REMOVED]' &&
                                    (url.startsWith('data:image/') ||
                                     url.endsWith('.png') ||
                                     url.endsWith('.jpg') ||
                                     url.endsWith('.jpeg') ||
                                     url.startsWith('http') || 
                                     url.startsWith('extracted_images/'))) {
                                    images.push({
                                        url: url,
                                        step: msgIdx + 1,
                                        role: msg.role || 'unknown',
                                        index: images.length
                                    });
                                }
                            }
                        });
                    }
                });
            }
            
            // 也检查 screenshot_url（只处理有效的路径）
            if (round.model_prediction?.screenshot_url) {
                const screenshotUrl = normalizeImagePath(round.model_prediction.screenshot_url);
                // 只处理以 extracted_images/ 开头或 data: 开头的有效图片路径
                if (screenshotUrl && 
                    (screenshotUrl.startsWith('data:image/') || 
                     screenshotUrl.startsWith('http') ||
                     screenshotUrl.startsWith('extracted_images/'))) {
                    images.push({
                        url: screenshotUrl,
                        step: 0,
                        role: 'screenshot',
                        index: images.length
                    });
                }
            }
            
            return images;
        }

        // 格式化动作数据
        function formatActionData(data) {
            if (!data) return 'N/A';
            if (typeof data === 'string') return data;
            
            const parts = [];
            for (const [key, value] of Object.entries(data)) {
                if (typeof value === 'string' && value.length > 50) {
                    parts.push(`${key}: "${value.substring(0, 50)}..."`);
                } else {
                    parts.push(`${key}: ${JSON.stringify(value)}`);
                }
            }
            return parts.join(', ');
        }

        /**
         * 从 Round 的 messages 中提取详细的 GUI 动作信息
         * @param {Object} round - Round 对象
         * @returns {Array} - 详细动作列表，每个元素包含 {type, description, details, coordinate, text}
         */
        function extractDetailedActions(round) {
            const detailedActions = [];
            const messages = round.model_prediction?.messages || [];
            
            messages.forEach((msg, msgIdx) => {
                // 查找 assistant 消息中的 tool_calls
                if (msg.role === 'assistant' && msg.tool_calls) {
                    msg.tool_calls.forEach(toolCall => {
                        if (toolCall.function?.name === 'computer_use' || 
                            toolCall.function?.name === 'computer') {
                            try {
                                const args = JSON.parse(toolCall.function.arguments || '{}');
                                const actionInfo = {
                                    type: args.action || 'unknown',
                                    toolCallId: toolCall.id,
                                    rawArgs: args
                                };
                                
                                // 根据动作类型提取详细信息
                                switch (args.action) {
                                    case 'left_click':
                                    case 'right_click':
                                    case 'double_click':
                                    case 'middle_click':
                                        actionInfo.description = `${getActionLabel(args.action)}`;
                                        if (args.coordinate) {
                                            actionInfo.coordinate = args.coordinate;
                                            actionInfo.details = `坐标: (${args.coordinate[0]}, ${args.coordinate[1]})`;
                                        }
                                        break;
                                    case 'type':
                                        actionInfo.description = '输入文本';
                                        actionInfo.text = args.text;
                                        actionInfo.details = `文本: "${truncateText(args.text, 50)}"`;
                                        break;
                                    case 'key':
                                        actionInfo.description = '按键';
                                        actionInfo.keys = args.key;
                                        actionInfo.details = `按键: ${Array.isArray(args.key) ? args.key.join(' + ') : args.key}`;
                                        break;
                                    case 'scroll':
                                        actionInfo.description = '滚动';
                                        actionInfo.details = `方向: ${args.direction || 'down'}, 距离: ${args.amount || 3}`;
                                        if (args.coordinate) {
                                            actionInfo.coordinate = args.coordinate;
                                            actionInfo.details += `, 坐标: (${args.coordinate[0]}, ${args.coordinate[1]})`;
                                        }
                                        break;
                                    case 'wait':
                                        actionInfo.description = '等待';
                                        actionInfo.details = `等待时间: ${args.duration || 2}秒`;
                                        break;
                                    case 'screenshot':
                                        actionInfo.description = '截图';
                                        actionInfo.details = '获取当前屏幕截图';
                                        break;
                                    case 'mouse_move':
                                        actionInfo.description = '移动鼠标';
                                        if (args.coordinate) {
                                            actionInfo.coordinate = args.coordinate;
                                            actionInfo.details = `移动到: (${args.coordinate[0]}, ${args.coordinate[1]})`;
                                        }
                                        break;
                                    default:
                                        actionInfo.description = args.action || 'unknown';
                                        actionInfo.details = JSON.stringify(args);
                                }
                                
                                detailedActions.push(actionInfo);
                            } catch (e) {
                                console.warn('解析 tool_call arguments 失败:', e);
                            }
                        }
                    });
                }
            });
            
            // 如果没有从 tool_calls 中提取到动作，使用原始的 actions 数组
            if (detailedActions.length === 0) {
                const originalActions = round.model_prediction?.actions || [];
                originalActions.forEach(action => {
                    const desc = action.description || '';
                    // 解析 "# Claude Computer Use: xxx" 格式
                    const match = desc.match(/Claude Computer Use:\s*(\w+)/i);
                    const actionType = match ? match[1] : (action.type || 'action');
                    
                    detailedActions.push({
                        type: actionType,
                        description: getActionLabel(actionType),
                        details: action.description || formatActionData(action.data),
                        rawAction: action
                    });
                });
            }
            
            return detailedActions;
        }

        /**
         * 从 Round 的 messages 中收集所有 tool_calls
         * @param {Object} round - Round 对象
         * @returns {Array} - tool_calls 列表，每个元素包含 {id, functionName, arguments, messageIdx, rawToolCall}
         */
        function collectToolCalls(round) {
            const toolCalls = [];
            const messages = round.model_prediction?.messages || [];
            
            messages.forEach((msg, msgIdx) => {
                if (msg.role === 'assistant' && msg.tool_calls && Array.isArray(msg.tool_calls)) {
                    msg.tool_calls.forEach(toolCall => {
                        const toolCallInfo = {
                            id: toolCall.id || 'unknown',
                            type: toolCall.type || 'function',
                            functionName: toolCall.function?.name || 'unknown',
                            arguments: toolCall.function?.arguments || '{}',
                            messageIdx: msgIdx,
                            rawToolCall: toolCall
                        };
                        
                        // 尝试解析arguments（如果是JSON字符串）
                        try {
                            if (typeof toolCallInfo.arguments === 'string') {
                                toolCallInfo.parsedArguments = JSON.parse(toolCallInfo.arguments);
                            } else {
                                toolCallInfo.parsedArguments = toolCallInfo.arguments;
                            }
                        } catch (e) {
                            toolCallInfo.parsedArguments = toolCallInfo.arguments;
                        }
                        
                        toolCalls.push(toolCallInfo);
                    });
                }
            });
            
            return toolCalls;
        }

        /**
         * 从 Round 的 messages 中收集所有 assistant 消息的 response（content）
         * @param {Object} round - Round 对象
         * @returns {Array} - response 列表，每个元素包含 {content, messageIdx, hasToolCalls}
         */
        function collectAssistantResponses(round) {
            const responses = [];
            const messages = round.model_prediction?.messages || [];
            
            messages.forEach((msg, msgIdx) => {
                if (msg.role === 'assistant') {
                    const content = msg.content;
                    const hasToolCalls = !!(msg.tool_calls && msg.tool_calls.length > 0);
                    // 只记录有实际内容（非空字符串）或有tool_calls的消息
                    if ((content && content.trim()) || hasToolCalls) {
                        responses.push({
                            content: content || '',
                            messageIdx: msgIdx,
                            hasToolCalls: hasToolCalls,
                            toolCallsCount: msg.tool_calls ? msg.tool_calls.length : 0
                        });
                    }
                }
            });
            
            // 如果round.model_prediction.response存在，也添加进去（作为主要响应）
            if (round.model_prediction?.response && round.model_prediction.response.trim()) {
                // 检查是否已经在responses中（避免重复）
                const alreadyExists = responses.some(r => r.content === round.model_prediction.response);
                if (!alreadyExists) {
                    responses.push({
                        content: round.model_prediction.response,
                        messageIdx: -1, // 标记为round级别的response
                        hasToolCalls: false,
                        toolCallsCount: 0,
                        isRoundResponse: true
                    });
                }
            }
            
            return responses;
        }

        /**
         * 截断过长的文本
         * @param {string} text - 原始文本
         * @param {number} maxLen - 最大长度
         * @returns {string} - 截断后的文本
         */
        function truncateText(text, maxLen) {
            if (!text) return '';
            if (text.length <= maxLen) return text;
            return text.substring(0, maxLen) + '...';
        }

        // 处理图片 URL（包括特殊字符编码）
        function processImageUrl(url) {
            if (!url) return '';
            url = normalizeImagePath(url);
            if (url.startsWith('data:image/')) return url;
            if (url.startsWith('http://') || url.startsWith('https://')) return url;
            
            // 对于本地路径，需要拼接 JSON 文件所在目录
            let processedUrl = url;
            
            // 如果路径不以 extracted_images/ 开头，添加它
            if (!url.startsWith('extracted_images/') && !url.includes('..') && !url.startsWith('/')) {
                processedUrl = 'extracted_images/' + url;
            }
            
            // 拼接 JSON 文件所在目录（支持从子目录加载的 JSON 文件）
            if (jsonBasePath && !processedUrl.startsWith(jsonBasePath)) {
                processedUrl = jsonBasePath + processedUrl;
            }
            
            // 对文件名中的特殊字符进行编码（保留路径分隔符）
            // 对所有路径段进行编码，除了空字符串（路径分隔产生的）
            processedUrl = processedUrl.split('/').map((part) => {
                if (part === '') return part;
                // 对所有部分进行编码，确保方括号等特殊字符被转义
                return encodeURIComponent(part);
            }).join('/');
            
            return processedUrl;
        }

        // ==================== 图片模态框 ====================
        function openImageModal(images, startIdx) {
            modalImages = images.map(img => ({
                ...img,
                url: processImageUrl(img.url)
            }));
            modalCurrentIdx = startIdx;
            updateModalImage();
            document.getElementById('image-modal').classList.add('active');
        }

        function updateModalImage() {
            const img = modalImages[modalCurrentIdx];
            document.getElementById('modal-image').src = img.url;
            document.getElementById('modal-counter').textContent = 
                `${modalCurrentIdx + 1} / ${modalImages.length}`;
        }

        function prevImage() {
            modalCurrentIdx = (modalCurrentIdx - 1 + modalImages.length) % modalImages.length;
            updateModalImage();
        }

        function nextImage() {
            modalCurrentIdx = (modalCurrentIdx + 1) % modalImages.length;
            updateModalImage();
        }

        function closeModal() {
            document.getElementById('image-modal').classList.remove('active');
        }

        // 键盘导航
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('image-modal').classList.contains('active')) return;
            
            if (e.key === 'Escape') closeModal();
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'ArrowRight') nextImage();
        });

        // 点击模态框背景关闭
        document.getElementById('image-modal').addEventListener('click', (e) => {
            if (e.target.id === 'image-modal') closeModal();
        });

        // ==================== 辅助函数 ====================
        /**
         * 将长文本按指定字符数分割为多行（用于 Plotly hovertemplate）
         * @param {string} text - 原始文本
         * @param {number} maxCharsPerLine - 每行最大字符数（默认70）
         * @returns {string} - 用 <br> 连接的多行文本
         */
        function wrapTextForHover(text, maxCharsPerLine = 40) {
            if (!text) return '';
            text = String(text).trim();
            
            // 如果文本很短，直接返回
            if (text.length <= maxCharsPerLine) return text;
            
            const lines = [];
            let currentLine = '';
            const words = text.split(' ');
            
            for (const word of words) {
                // 如果单个词就超过限制，强制断行
                if (word.length > maxCharsPerLine) {
                    if (currentLine) {
                        lines.push(currentLine);
                        currentLine = '';
                    }
                    // 将长词分段
                    for (let i = 0; i < word.length; i += maxCharsPerLine) {
                        lines.push(word.substring(i, i + maxCharsPerLine));
                    }
                    continue;
                }
                
                // 检查加入这个词后是否超过限制
                const testLine = currentLine ? currentLine + ' ' + word : word;
                if (testLine.length > maxCharsPerLine) {
                    if (currentLine) {
                        lines.push(currentLine);
                    }
                    currentLine = word;
                } else {
                    currentLine = testLine;
                }
            }
            
            if (currentLine) {
                lines.push(currentLine);
            }
            
            return lines.join('<br>');
        }
        
        function closeDetailPanel() {
            document.getElementById('detail-panel').classList.remove('active');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        function showError(message) {
            const banner = document.getElementById('error-banner');
            banner.textContent = '❌ ' + message;
            banner.classList.add('active');
            setTimeout(() => banner.classList.remove('active'), 5000);
        }

        function hideError() {
            document.getElementById('error-banner').classList.remove('active');
        }
    </script>
