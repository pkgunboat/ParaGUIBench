# ─────────────────────────────────────────────────────────────
# ParaGUIBench 外部服务编排
#   - OnlyOffice DocumentServer：SearchWrite pipeline 依赖
#   - Flask 文档共享服务：封装 OnlyOffice 的任务级共享链接
#   - WebMall 商城（4 个 WordPress+WooCommerce 店铺）：WebMall pipeline 依赖
# ─────────────────────────────────────────────────────────────
# 用法（首次部署）：
#     bash scripts/setup_webmall.sh          # 恢复备份数据 + 初始化
#     bash scripts/start_services.sh         # 启动所有服务
#
# 用法（后续启动）：
#     bash scripts/start_services.sh
#     bash scripts/stop_services.sh
#
# 所有端口来自 configs/deploy.yaml 的 services.*，由 start_services.sh
# 通过 Python 解析后导出为环境变量。
# ─────────────────────────────────────────────────────────────

services:
  # ═══════════════════════════════════════════════════════════
  # OnlyOffice 文档编辑服务
  # ═══════════════════════════════════════════════════════════

  onlyoffice:
    image: onlyoffice/documentserver:8.1
    container_name: bench-onlyoffice
    restart: unless-stopped
    ports:
      - "${ONLYOFFICE_DOC_PORT:-8080}:80"
    environment:
      - JWT_ENABLED=false
    volumes:
      - ./onlyoffice/data:/var/www/onlyoffice/Data
      - ./onlyoffice/logs:/var/log/onlyoffice

  onlyoffice-share:
    image: python:3.11-slim
    container_name: bench-onlyoffice-share
    restart: unless-stopped
    depends_on:
      - onlyoffice
    ports:
      - "${ONLYOFFICE_FLASK_PORT:-5050}:5050"
    working_dir: /app
    volumes:
      - ./onlyoffice:/app:ro
      - ./onlyoffice/shared_documents:/app/shared_documents
    environment:
      - HOST_IP=${ONLYOFFICE_HOST_IP:-127.0.0.1}
      - DOC_SERVER_PORT=${ONLYOFFICE_DOC_PORT:-8080}
      - FLASK_PORT=5050
    command: >
      sh -c "pip install --no-cache-dir flask requests python-docx openpyxl python-pptx
             && python document_sharing_server.py"

  # ═══════════════════════════════════════════════════════════
  # WebMall 商城服务
  # 每个店铺 = MariaDB + WordPress(WooCommerce)，共享 Elasticsearch
  # 端口 9081-9084 分别对应 shop 1-4
  # ═══════════════════════════════════════════════════════════

  webmall-frontend:
    image: nginx:latest
    container_name: bench-webmall-frontend
    restart: unless-stopped
    ports:
      - "${WEBMALL_FRONTEND_PORT:-8090}:80"
    volumes:
      - ./webmall/index.html:/usr/share/nginx/html/index.html:ro

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: bench-webmall-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - webmall_esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Shop 1 ──────────────────────────────────────────────
  mariadb-shop1:
    image: bitnami/mariadb:latest
    container_name: bench-mariadb-1
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=${WEBMALL_DB_ROOT_PASSWORD:-rootpassword}
      - MARIADB_USER=bn_wordpress
      - MARIADB_PASSWORD=${WEBMALL_DB_PASSWORD:-wordpress_db_password}
      - MARIADB_DATABASE=bitnami_wordpress
    volumes:
      - webmall_mariadb_shop1:/bitnami/mariadb
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "bn_wordpress", "-p${WEBMALL_DB_PASSWORD:-wordpress_db_password}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  wordpress-shop1:
    image: bitnami/wordpress:latest
    container_name: bench-wordpress-1
    restart: unless-stopped
    depends_on:
      mariadb-shop1:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    ports:
      - "${WEBMALL_PORT_1:-9081}:8080"
    environment:
      WORDPRESS_DATABASE_HOST: mariadb-shop1
      WORDPRESS_DATABASE_USER: bn_wordpress
      WORDPRESS_DATABASE_PASSWORD: ${WEBMALL_DB_PASSWORD:-wordpress_db_password}
      WORDPRESS_DATABASE_NAME: bitnami_wordpress
      WORDPRESS_USERNAME: ${WEBMALL_ADMIN_USER:-admin}
      WORDPRESS_PASSWORD: ${WEBMALL_ADMIN_PASSWORD:-admin}
      WORDPRESS_EMAIL: user@example.com
      WORDPRESS_CONFIG_EXTRA: |
        define('EP_HOST','http://elasticsearch:9200');
        define('EP_INDEX_PREFIX','shop1_');
    volumes:
      - webmall_wordpress_shop1:/bitnami/wordpress
      - ./webmall/fix_urls.sh:/usr/local/bin/fix_urls.sh:ro
      - ./webmall/fix_urls_deploy.sh:/usr/local/bin/fix_urls_deploy.sh:ro
    healthcheck:
      test: ["CMD", "wp", "core", "is-installed", "--path=/opt/bitnami/wordpress"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Shop 2 ──────────────────────────────────────────────
  mariadb-shop2:
    image: bitnami/mariadb:latest
    container_name: bench-mariadb-2
    restart: unless-stopped
