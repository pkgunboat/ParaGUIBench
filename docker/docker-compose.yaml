      - MARIADB_USER=bn_wordpress
      - MARIADB_PASSWORD=${WEBMALL_DB_PASSWORD:-wordpress_db_password}
      - MARIADB_DATABASE=bitnami_wordpress
    volumes:
      - webmall_mariadb_shop2:/bitnami/mariadb
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "bn_wordpress", "-p${WEBMALL_DB_PASSWORD:-wordpress_db_password}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  wordpress-shop2:
    image: bitnami/wordpress:latest
    container_name: bench-wordpress-2
    restart: unless-stopped
    depends_on:
      mariadb-shop2:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    ports:
      - "${WEBMALL_PORT_2:-9082}:8080"
    environment:
      WORDPRESS_DATABASE_HOST: mariadb-shop2
      WORDPRESS_DATABASE_USER: bn_wordpress
      WORDPRESS_DATABASE_PASSWORD: ${WEBMALL_DB_PASSWORD:-wordpress_db_password}
      WORDPRESS_DATABASE_NAME: bitnami_wordpress
      WORDPRESS_USERNAME: ${WEBMALL_ADMIN_USER:-admin}
      WORDPRESS_PASSWORD: ${WEBMALL_ADMIN_PASSWORD:-admin}
      WORDPRESS_EMAIL: user@example.com
      WORDPRESS_CONFIG_EXTRA: |
        define('EP_HOST','http://elasticsearch:9200');
        define('EP_INDEX_PREFIX','shop2_');
    volumes:
      - webmall_wordpress_shop2:/bitnami/wordpress
      - ./webmall/fix_urls.sh:/usr/local/bin/fix_urls.sh:ro
      - ./webmall/fix_urls_deploy.sh:/usr/local/bin/fix_urls_deploy.sh:ro
    healthcheck:
      test: ["CMD", "wp", "core", "is-installed", "--path=/opt/bitnami/wordpress"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Shop 3 ──────────────────────────────────────────────
  mariadb-shop3:
    image: bitnami/mariadb:latest
    container_name: bench-mariadb-3
    restart: unless-stopped
